name: Deploy

# Trigger on every push to master
on:
  push:
    branches: [master]

# Prevent overlapping deploys
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull → Build → Restart
    runs-on: self-hosted        # executes on your Ubuntu machine
    defaults:
      run:
        working-directory: /home/mfelobes/Projects/gdrive-your-music

    steps:
      - name: Pull latest code
        run: git pull origin master

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Restart with PM2 — starts the process if it isn't already running.
      # If you haven't installed PM2 yet:  npm install -g pm2
      - name: Restart app
        run: |
          pm2 restart gdrive-your-music \
            || pm2 start npm --name gdrive-your-music -- start
          pm2 save